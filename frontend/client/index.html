    <script>
      // SEO: Domain enforcement, trailing-slash normalization, and canonical tag
      // Runs before React to ensure Googlebot sees correct signals in static HTML
      (function() {
        var host = location.hostname;
        var path = location.pathname;
        var PRIMARY = 'realitycents.com';
        var BASE = 'https://' + PRIMARY;

        // 1. Redirect www and manus.space to primary domain (301-equivalent via JS)
        if (host !== PRIMARY && host !== 'localhost' && host !== '127.0.0.1' && !host.includes('manus.computer')) {
          location.replace(BASE + path + location.search + location.hash);
          return;
        }

        // 2. For non-primary domains that can't redirect (manus.space), add noindex
        if (host !== PRIMARY && !host.includes('manus.computer') && host !== 'localhost' && host !== '127.0.0.1') {
          var meta = document.createElement('meta');
          meta.name = 'robots';
          meta.content = 'noindex, nofollow';
          document.head.appendChild(meta);
        }

        // 3. Strip trailing slash (except root /)
        if (path.length > 1 && path.endsWith('/')) {
          var clean = path.replace(/\/+$/, '');
          history.replaceState(null, '', clean + location.search + location.hash);
          path = clean;
        }

        // 4. Set canonical tag to primary domain + clean path
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) {
          canonical.href = BASE + (path === '/' ? '/' : path);
        }
      })();
    </script>
